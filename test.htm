<!DOCTYPE html>

<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>

    <div class="cuenta-atras">
        <div class="grupo">
            <p class="grande" id="dias">00</p>
            <p class="chico">Dias</p>
        </div>
        <div class="grupo">
            <p class="grande" id="horas">00</p>
            <p class="chico">Horas</p>
        </div>
        <div class="grupo">
            <p class="grande" id="minutos">00</p>
            <p class="chico">Minutos</p>
        </div>
       <div class="grupo">
            <p class="grande" id="segundos">00</p>
            <p class="chico">Segundos</p>
        </div>
    </div>
  </body>
</html>
<style>
  .cuenta-atras{
    align-items: cen  ter;
    min-height: 100vh;
    justify-content: center;
    text-align: center;
    display: flex;
    gap: 2rem;
    font-size: small;
    gap:1rem;
  }
</style>

<script>

 
 function actualizarDiferencia() {
            const ahora = new Date();
            const fechaObjetivo = new Date(2026, 8, 16, 19, 45, 0).getTime();
            // Diferencia en milisegundos
            const diferencia = fechaObjetivo - ahora;

            if (diferencia <= 0) {
                document.getElementById("diferencia").innerHTML = "¡Tiempo cumplido!";
                clearInterval(intervalo); // Detener el reloj
                return;
            }

            // 2. Convertir milisegundos a días, horas, minutos y segundos
            const segundos = Math.floor((diferencia / 1000) % 60);
            const minutos = Math.floor((diferencia / 1000 / 60) % 60);
            const horas = Math.floor((diferencia / (1000 * 60 * 60)) % 24);
            const dias = Math.floor(diferencia / (1000 * 60 * 60 * 24));

            // 3. Mostrar el resultado en el DOM
            document.getElementById("dias").innerHTML =  dias;
            document.getElementById("horas").innerHTML = horas;
            document.getElementById("minutos").innerHTML = minutos;
            document.getElementById("segundos").innerHTML = segundos;          
        }

        // 4. Ejecutar la función inmediatamente y luego cada 1000ms (1 segundo)
        actualizarDiferencia();
        const intervalo = setInterval(actualizarDiferencia, 1000);

</script>
